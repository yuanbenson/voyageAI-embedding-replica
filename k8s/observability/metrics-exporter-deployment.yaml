apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-metrics-exporter
  namespace: inference
  labels:
    app: embedding-metrics-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-metrics-exporter
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "9090"
      labels:
        app: embedding-metrics-exporter
        model-lane: voyage-4-nano
        workload: metrics
    spec:
      enableServiceLinks: false
      containers:
        - name: metrics-exporter
          image: us-central1-docker.pkg.dev/voyage-replica-dev/voyage-replica/embedding-api:phase3-amd64
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.metrics_exporter"]
          ports:
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: embedding-gateway-config
          env:
            - name: LOCAL_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: embedding-gateway-secrets
                  key: LOCAL_API_KEYS
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: embedding-gateway-secrets
                  key: HUGGING_FACE_HUB_TOKEN
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
