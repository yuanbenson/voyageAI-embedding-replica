apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: embedding-query-batch-worker-token-backlog
  namespace: inference
  labels:
    app.kubernetes.io/name: embedding-query-batch-worker
    app.kubernetes.io/component: autoscaling
    phase: phase3d
spec:
  scaleTargetRef:
    name: embedding-query-batch-worker
  pollingInterval: 5
  cooldownPeriod: 30
  minReplicaCount: 1
  maxReplicaCount: 4
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus:9090
        metricName: query_token_backlog
        query: voyage_queue_token_backlog{model="voyage-4-nano",workload="query"}
        threshold: "512"
