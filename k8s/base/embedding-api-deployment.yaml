apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-api
  namespace: inference
  labels:
    app: embedding-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: embedding-api
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
      labels:
        app: embedding-api
    spec:
      enableServiceLinks: false
      containers:
        - name: embedding-api
          image: us-central1-docker.pkg.dev/voyage-replica-dev/voyage-replica/embedding-api:phase3-amd64
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: embedding-gateway-config
          env:
            - name: GATEWAY_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LOCAL_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: embedding-gateway-secrets
                  key: LOCAL_API_KEYS
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: embedding-gateway-secrets
                  key: HUGGING_FACE_HUB_TOKEN
                  optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
