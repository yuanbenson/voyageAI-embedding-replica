apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-query-batch-worker
  namespace: inference
  labels:
    app: embedding-query-batch-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-query-batch-worker
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "9090"
      labels:
        app: embedding-query-batch-worker
        model-lane: voyage-4-nano
        workload: query
    spec:
      enableServiceLinks: false
      containers:
        - name: batch-worker
          image: us-central1-docker.pkg.dev/voyage-replica-dev/voyage-replica/embedding-api:phase3-amd64
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.batch_worker"]
          ports:
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: embedding-gateway-config
          env:
            - name: LOCAL_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: embedding-gateway-secrets
                  key: LOCAL_API_KEYS
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: embedding-gateway-secrets
                  key: HUGGING_FACE_HUB_TOKEN
                  optional: true
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
