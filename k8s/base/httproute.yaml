apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: embedding-api-route
  namespace: inference
spec:
  parentRefs:
    - name: embedding-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/embeddings
        - path:
            type: PathPrefix
            value: /healthz
      backendRefs:
        - name: embedding-api
          port: 80
